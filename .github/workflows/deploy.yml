name: Deploy Log Analyzer

on:
  push:
    branches: [ main ]
    paths:
      - 'log_analyzer_agent/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./log_analyzer_agent
          push: true
          tags: zxcrty/log-analyzer:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull zxcrty/log-analyzer:latest
            docker stop log-analyzer || true
            docker rm log-analyzer || true
            docker run -d \
              --name log-analyzer \
              -p 8000:8000 \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              -e SERPER_API_KEY="${{ secrets.SERPER_API_KEY }}" \
              zxcrty/log-analyzer:latest